<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#e2e8f0", // Silver/White for light/dark elements
              accent: "#ef4444",  // Red accent seen in the small icon
              "background-light": "#f8fafc",
              "background-dark": "#000000",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'spin-slow': 'spin 12s linear infinite',
              'float': 'float 6s ease-in-out infinite',
              'wave': 'wave 3s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              wave: {
                '0%, 100%': { opacity: 0.2, transform: 'scale(1)' },
                '50%': { opacity: 0.6, transform: 'scale(1.05)' },
              }
            }
          },
        },
      };

<style>.glow-ring {

.energy-wave {

.scanline {
    width: 100%;
    height: 100px;
    z-index: 30;

    opacity: 0.1;
    position: absolute;
    bottom: 100%;
    animation: scan 8s linear infinite
    }
@keyframes scan {
    0% {
        bottom: -100px;
        } 100% {
        bottom: 100%;
        }
    }
body {
    overflow: hidden
    }

                Acknowledged, Sir. Systems initialized. All protocols operational and ready to assist.

<div class="absolute bottom-8 left-1/2 -translate-x-1/2">
<div class="relative">

</div>

</div>

<script>
        // Real-time clock for the dashboard feel
        function updateClock() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                            now.getMinutes().toString().padStart(2, '0') + ':' +
                            now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').textContent = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
